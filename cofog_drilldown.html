    function showOverview() {
        const trace = {
            type: "bar",
            orientation: "h",
            x: overview.values,
            y: overview.categories,
            customdata: overview.parent_codes,
            hovertemplate: "<b>%{y}</b><br>Spending: %{x} billion DKK<extra></extra>"
        };

        const layout = {
            title: "Public spending by main COFOG category, " + overview.year,
            xaxis: {
                title: "Spending, billion DKK"
            },
            yaxis: {
                automargin: true
            },
            margin: {
                l: 260,
                r: 40,
                t: 70,
                b: 60
            },
            clickmode: "event+select"
        };

        Plotly.newPlot("chart", [trace], layout, {responsive: true});

        const chart = document.getElementById("chart");

        chart.on("plotly_click", function(data) {
            const parentCode = data.points[0].customdata;
            showSubcategories(parentCode);
        });
    }

    function showSubcategories(parentCode) {
        const selected = subData[parentCode];

        const traces = selected.traces.map(function(t) {
            return {
                type: "scatter",
                mode: "lines+markers",
                name: t.name,
                x: t.x,
                y: t.y,
                hovertemplate: "<b>" + t.name + "</b><br>Year: %{x}<br>Spending: %{y} billion DKK<extra></extra>"
            };
        });

        const layout = {
            title: "Inside " + selected.main_category,
            xaxis: {
                title: "Year"
            },
            yaxis: {
                title: "Spending, billion DKK"
            },
            margin: {
                l: 80,
                r: 40,
                t: 70,
                b: 60
            },
            legend: {
                orientation: "h",
                y: -0.25
            }
        };

        Plotly.newPlot("chart", traces, layout, {responsive: true});
    }

    showOverview();
</script>
